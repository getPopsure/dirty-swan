name: Release

on:
  release:
    branches:
      - main
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for npm Trusted Publishing (OIDC)
      contents: write # Required to push the version bump back to main

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: yarn install
        run: |
          yarn install
      - name: Set env
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" | sed 's/v//' >> $GITHUB_ENV
      - name: Configure GitHub
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
      - name: Build new version
        run: yarn build
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          scope: '@popsure'
      - name: Set package version
        run: npm version $RELEASE_VERSION --no-git-tag-version --allow-same-version
      - name: Publish new version
        # No NODE_AUTH_TOKEN: npm authenticates via the OIDC token exchange.
        # Provenance attestations are generated automatically.
        run: npm publish --access public
      - name: Push new package.json version
        run: |
          git commit -am "Bumped package.json to $RELEASE_VERSION"
          git push origin HEAD:main
